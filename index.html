<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My IP & Client Info</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #e6e6e6;
    padding: 20px;
  }
  .box {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 12px;
    max-width: 450px;
    margin: auto;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
  }
  h2 {
    margin-top: 0;
    color: #4dd0ff;
    text-align: center;
  }
  .label {
    font-size: 12px;
    color: #999;
    margin-top: 12px;
  }
  .value {
    font-size: 17px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.8s forwards;
  }
  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>
<div class="box">
  <h2>My IP & Client Info</h2>

  <div class="label">IP Address</div>
  <div id="ip" class="value"></div>

  <div class="label">City</div>
  <div id="city" class="value"></div>

  <div class="label">Region</div>
  <div id="region" class="value"></div>

  <div class="label">Country</div>
  <div id="country" class="value"></div>

  <div class="label">ISP</div>
  <div id="org" class="value"></div>

  <div class="label">Coordinates</div>
  <div id="loc" class="value"></div>

  <div class="label">Browser</div>
  <div id="browser" class="value"></div>

  <div class="label">Operating System</div>
  <div id="os" class="value"></div>

  <div class="label">Screen Size</div>
  <div id="screen" class="value"></div>

  <div id="status" style="margin-top:20px; font-size:12px; color:#777; text-align:center;">
    Loading…
  </div>
</div>

<script>
function reveal(element, delay) {
  element.style.animationDelay = delay + "ms";
}

async function loadInfo() {
  const status = document.getElementById("status");

  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    const fields = [
      ["ip", data.ip],
      ["city", data.city],
      ["region", data.region],
      ["country", data.country_name],
      ["org", data.org],
      ["loc", data.latitude + ", " + data.longitude],
      ["browser", navigator.userAgent],
      ["os", navigator.platform],
      ["screen", window.screen.width + " x " + window.screen.height]
    ];

    let delay = 200;
    fields.forEach(([id, value]) => {
      const el = document.getElementById(id);
      el.textContent = value;
      reveal(el, delay);
      delay += 250;
    });

    status.textContent = "Updated: " + new Date().toLocaleString();
  } catch (e) {
    status.textContent = "Failed to load info";
  }
}

loadInfo();
</script>
</body>
</html>
