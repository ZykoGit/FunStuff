<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fun Stuff</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: monospace;
    background: #000;
    color: #ff3b3b;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  .box {
    width: 92%;
    max-width: 500px;
    background: #150000;
    padding: 22px;
    margin-top: 25px;
    border-radius: 14px;
    box-shadow: 0 0 25px rgba(255,0,0,0.35);
  }

  h2 {
    margin: 0 0 18px 0;
    color: #ff4d4d;
    text-align: center;
    font-size: 1.6rem;
    letter-spacing: 2px;
  }

  .value {
    font-size: 1.05rem;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.8s forwards;
    margin: 14px 0;
    word-break: break-word;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  #status {
    margin-top: 20px;
    font-size: 0.75rem;
    color: #aa0000;
    text-align: center;
  }
</style>
</head>

<body>
<div class="box">
  <h2>Heres Your Fun Stuff</h2>

  <div id="ip" class="value"></div>
  <div id="city" class="value"></div>
  <div id="region" class="value"></div>
  <div id="country" class="value"></div>
  <div id="org" class="value"></div>
  <div id="loc" class="value"></div>
  <div id="browser" class="value"></div>
  <div id="os" class="value"></div>
  <div id="screen" class="value"></div>

  <div id="status">Loading…</div>
</div>

<script>
function reveal(element, delay) {
  element.style.animationDelay = delay + "ms";
}

async function loadInfo() {
  const status = document.getElementById("status");

  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    const fields = [
      ["ip", data.ip],
      ["city", data.city],
      ["region", data.region],
      ["country", data.country_name],
      ["org", data.org],
      ["loc", data.latitude + ", " + data.longitude],
      ["browser", navigator.userAgent],
      ["os", navigator.platform],
      ["screen", window.screen.width + " x " + window.screen.height]
    ];

    let delay = 200;
    fields.forEach(([id, value]) => {
      const el = document.getElementById(id);
      el.textContent = value;
      reveal(el, delay);
      delay += 250;
    });

    status.textContent = "Updated: " + new Date().toLocaleString();
  } catch (e) {
    status.textContent = "Unable to load info";
  }
}

loadInfo();
</script>
</body>
</html>
